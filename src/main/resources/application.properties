spring.application.name=osciloscopio
server.port=8080

# Niveles de log
logging.level.org.example=DEBUG
logging.level.org.example.service=DEBUG
logging.level.org.example.controller=INFO

# Formato de log con fecha, nivel, clase y mensaje
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# Archivo de log (opcional)
# logging.file.name=logs/osciloscopio.log
